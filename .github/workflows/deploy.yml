name: Export Game & Deploy Website

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  export-web:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.1

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p /github/home/.local/share/godot/export_templates/4.6.1.stable
          mv /root/.local/share/godot/export_templates/4.6.1.stable/* /github/home/.local/share/godot/export_templates/4.6.1.stable/ 2>/dev/null || true
          # Also link in case Godot looks in /root
          ln -sf /github/home/.local/share/godot/export_templates /root/.local/share/godot/export_templates 2>/dev/null || true

      - name: Import resources
        run: godot --headless --path . --import

      - name: Export game for web
        run: |
          mkdir -p _site/game
          godot --headless --verbose --path . --export-release "Web" _site/game/index.html

      - name: Upload game artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: _site/game/

  deploy:
    needs: export-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download game artifact
        uses: actions/download-artifact@v4
        with:
          name: web-export
          path: _site/game/

      - name: Copy website files
        run: |
          cp website/index.html _site/
          cp website/play.html _site/
          cp -r website/css _site/
          cp -r website/js _site/
          cp website/privacy.html _site/
          cp website/CNAME _site/
          cp website/manifest.json _site/
          cp website/sw.js _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
